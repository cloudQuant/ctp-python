name: Build & Test

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'ctp.i'
      - 'setup.py'
      - 'ctp/**'
      - 'tests/**'

jobs:
  test_basic:
    name: Basic Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install swig (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install swig
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1

      - name: Install swig (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y swig

      - name: Build and install
        run: pip install .

      - name: Install test deps
        run: pip install pytest python-dotenv

      - name: Run offline tests
        run: python -m pytest tests/test_basic.py -v --tb=short

  build_unix:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        version: ["cp37", "cp38", "cp39", "cp310", "cp311", "cp312", "cp313"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup swig for macos
        if: matrix.os == 'macos-latest'
        run: |
          brew install swig
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1

      - name: Setup pip
        run: |
          python -m pip install --upgrade pip cibuildwheel

      - name: Build wheel
        run: python -m cibuildwheel --output-dir dist
        env:
          CIBW_BUILD: ${{ matrix.version }}-*
          CIBW_SKIP: "cp36-* *-win* *_i686 *-musllinux*"
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          # Skip delocate for macOS builds
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: ""

      - uses: actions/upload-artifact@v4
        with:
          name: ctp-python-${{ matrix.os }}-${{ matrix.version }}
          path: ./dist/*.whl

  build_win:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]
        python-version: ["3.7", "3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: ${{ matrix.python-version }}

      - name: Prepare Windows
        if: matrix.os == 'windows-latest'
        run: |
          conda init
          conda install -c conda-forge libiconv

      - name: Setup pip for Windows
        run: |
          python -m pip install --upgrade pip wheel build

      - name: Build wheel for Windows
        run: python -m build -w -n

      - uses: actions/upload-artifact@v4
        with:
          name: ctp-python-windows-${{ matrix.python-version }}
          path: ./dist/*.whl
