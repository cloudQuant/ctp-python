site_name: ctp-python 文档
site_description: CTP Python 期货交易接口文档与教程
site_url: https://cloudquant.github.io/ctp-python/
repo_url: https://github.com/cloudQuant/ctp-python
repo_name: cloudQuant/ctp-python

docs_dir: docs

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换至深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换至浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cloudQuant/ctp-python
      name: Fork (cloudQuant/ctp-python)
    - icon: fontawesome/solid/code-branch
      link: https://github.com/keli/ctp-python
      name: 原始仓库 (keli/ctp-python)

copyright: |
  Fork: <a href="https://github.com/cloudQuant/ctp-python">cloudQuant/ctp-python</a> |
  原始仓库: <a href="https://github.com/keli/ctp-python">keli/ctp-python</a> |
  BSD License

nav:
  - 首页: index.md
  - 使用教程: tutorial.md
  - API 参考:
    - 行情接口: api-reference-md.md
    - 交易接口: api-reference-trader.md
  - 项目文档:
    - 项目概览: project-overview.md
    - 架构设计: architecture.md
    - 源码结构: source-tree-analysis.md
    - 开发指南: development-guide.md
